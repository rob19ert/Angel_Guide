version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fishguide_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fishguide
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: fishguide_minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: superpassword
    ports:
      - "9000:9000" # Порт для API (бэкенда)
      - "9001:9001" # Порт для веб-интерфейса
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata: